name: Tabby
options:
  bundleIdPrefix: com.tabbyapp
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    INFOPLIST_FILE: AIFam/Info.plist

targets:
  AIFam:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: AIFam
        excludes:
          - "Info.plist"
    info:
      path: AIFam/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tabbyapp.ios
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: AIFam/Info.plist
        DEVELOPMENT_TEAM: "QVRF3K3299"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    entitlements:
      path: AIFam/AIFam.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tabbyapp.shared
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
    dependencies:
      - sdk: SwiftData.framework
      - sdk: EventKit.framework
      - sdk: Contacts.framework
      - sdk: CoreLocation.framework
      - sdk: HealthKit.framework
      - sdk: BackgroundTasks.framework
      - sdk: FoundationModels.framework
        weak: true
      - sdk: NaturalLanguage.framework
      - sdk: UserNotifications.framework
      - target: AIFamWidgetExtension

  AIFamWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: AIFamWidget
        excludes:
          - "Info.plist"
    info:
      path: AIFamWidget/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tabbyapp.ios.widget
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: AIFamWidget/Info.plist
        DEVELOPMENT_TEAM: "QVRF3K3299"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: AIFamWidget/AIFamWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tabbyapp.shared
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
