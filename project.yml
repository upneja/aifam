name: AIFam
options:
  bundleIdPrefix: com.aifam
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    INFOPLIST_FILE: AIFam/Info.plist

targets:
  AIFam:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: AIFam
        excludes:
          - "Info.plist"
    info:
      path: AIFam/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aifam.app
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: AIFam/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    dependencies:
      - sdk: SwiftData.framework
